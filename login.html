<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Mathspace</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="fixed-header fixed-header-login-page">
    <nav class="topbar-anonymous">
        <div class="logo-container">
            <img alt="Mathspace" src="https://mathspace-production-static.mathspace.co/static/cache/b79f23b1077d57a50f6c10dc38374714cdd60f5b/img/core/mathspace.svg" style="width: 144px;">
        </div>
        <div class="join-class-link">
            <a href="#">Join class</a>
        </div>
    </nav>
</div>

<div class="login-page">
    <div class="container">
        <div class="row">
            <div class="col-sm-6 col-sm-push-3">
                <h2 class="text-center login-h2">Login</h2>

                <div class="form">
                    <form id="login-form" novalidate>
                        <div class="form-group">
                            <input type="text" id="id_username" class="form-control input-lg" placeholder="Username or Email" required>
                        </div>

                        <div id="password-group" class="form-group" style="display: none;">
                            <input type="password" id="id_password" class="form-control input-lg" placeholder="Password" required>
                        </div>

                        <div class="form-group">
                            <div class="row">
                                <div class="col-xs-6">
                                    <label>
                                        <input type="checkbox"> Remember me
                                    </label>
                                </div>
                                <div class="col-xs-6 text-right">
                                    <a href="#" class="forgot-pw">Forgot password</a>
                                </div>
                            </div>
                        </div>

                        <button type="submit" id="submit-btn" class="btn btn-primary btn-lg btn-block">
                            Continue
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Clever Login -->
        <div class="row mtl">
            <div class="col-sm-6 col-sm-push-3">
                <a href="#" class="btn btn-lg btn-block clever-login">
                    Sign in with Clever
                </a>
            </div>
        </div>
    </div>
</div>

<!-- Games Iframe -->
<div id="game-iframe-container" style="display: none; padding: 40px 20px; text-align: center;">
    <h2 style="color: #1ABC9C; margin-bottom: 20px;">Welcome! Loading Games...</h2>
    <iframe id="game-iframe" width="100%" height="760px" 
            style="border: 3px solid #1ABC9C; border-radius: 12px; max-width: 1200px; box-shadow: 0 10px 40px rgba(0,0,0,0.2);" 
            allowfullscreen></iframe>
    <br><br>
    <button onclick="backToLogin()" class="btn btn-primary" style="width: auto; padding: 12px 30px;">
        ← Back to Login
    </button>
</div>

<script src="script.js"></script>
</body>
</html>
